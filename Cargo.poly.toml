[package]
name = "agent-browser"
version = "0.20.0"
edition = "2024"
description = "Fast browser automation CLI for AI agents"
license = "Apache-2.0"
repository = "https://github.com/vercel-labs/agent-browser"
homepage = "https://agent-browser.dev"
readme = "../README.md"
keywords = ["browser", "automation", "ai", "cdp", "chrome"]
categories = ["command-line-utilities", "web-programming"]

[dependencies]
aes-gcm = true
async-trait = true
base64 = true
dirs = true
futures-util = true
getrandom = true
image = true
reqwest = { default-features = false, features = ["json", "query", "rustls"] }
serde = { features = ["derive"] }
serde_json = true
sha2 = true
similar = true
tokio = { features = ["rt-multi-thread", "macros", "net", "io-util", "time", "sync", "signal"] }
tokio-tungstenite = { features = ["rustls-tls-webpki-roots"] }
url = true
uuid = { features = ["v4"] }
zip = { default-features = false, features = ["deflate"] }

[target.'cfg(unix)'.dependencies]
libc = true

[target.'cfg(windows)'.dependencies]
windows-sys = { features = ["Win32_System_Threading", "Win32_Foundation"] }

[build-dependencies]
serde = { features = ["derive"] }
serde_json = true

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.ci]
inherits = "release"
lto = "thin"
codegen-units = 16
